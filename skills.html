<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skills | Puspita Dhar</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white font-sans">

  <!-- Navbar -->
  <nav class="fixed top-0 left-0 w-full bg-gray-900 shadow-lg z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

      <!-- Logo -->
      <h1 class="text-2xl font-bold text-cyan-400">
        Puspita Dhar
      </h1>

      <!-- Navigation Links -->
      <div class="space-x-6 hidden md:flex">
        <a href="index.html" class="hover:text-cyan-400 transition duration-300">Home</a>
        <a href="about.html" class="hover:text-cyan-400 transition duration-300">About Me</a>
        <a href="skills.html" class="text-cyan-400">Skills</a>
        <a href="projects.html" class="hover:text-cyan-400 transition duration-300">Projects</a>
        <a href="contact.html" class="hover:text-cyan-400 transition duration-300">Contact Us</a>
      </div>

    </div>
  </nav>

  <!-- Skills Section -->
  <section class="min-h-screen px-6 pt-32 pb-16 flex items-center justify-center">

    <div class="max-w-5xl w-full bg-gray-900 rounded-3xl shadow-2xl p-10 border border-gray-800">

      <!-- Heading -->
      <h2 class="text-4xl md:text-5xl font-bold text-center text-cyan-400 mb-12">
        My Skills
      </h2>

      <!-- Skills Grid -->
      <div class="grid md:grid-cols-2 gap-8">

        <!-- Skill 1: HTML -->
        <div class="space-y-2">
          <div class="flex justify-between font-semibold">
            <span>HTML</span>
            <span class="text-cyan-400">90%</span>
          </div>
          <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden">
            <div class="bg-cyan-500 h-full rounded-full" style="width: 90%"></div>
          </div>
        </div>

        <!-- Skill 2: Tailwind CSS -->
        <div class="space-y-2">
          <div class="flex justify-between font-semibold">
            <span>Tailwind CSS</span>
            <span class="text-cyan-400">85%</span>
          </div>
          <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden">
            <div class="bg-cyan-500 h-full rounded-full" style="width: 85%"></div>
          </div>
        </div>

        <!-- Skill 3: JavaScript -->
        <div class="space-y-2">
          <div class="flex justify-between font-semibold">
            <span>JavaScript</span>
            <span class="text-cyan-400">75%</span>
          </div>
          <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden">
            <div class="bg-cyan-500 h-full rounded-full" style="width: 75%"></div>
          </div>
        </div>

        <!-- Skill 4: Java -->
        <div class="space-y-2">
          <div class="flex justify-between font-semibold">
            <span>Java</span>
            <span class="text-cyan-400">80%</span>
          </div>
          <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden">
            <div class="bg-cyan-500 h-full rounded-full" style="width: 80%"></div>
          </div>
        </div>

        <!-- Skill 5: MySQL -->
        <div class="space-y-2">
          <div class="flex justify-between font-semibold">
            <span>MySQL</span>
            <span class="text-cyan-400">70%</span>
          </div>
          <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden">
            <div class="bg-cyan-500 h-full rounded-full" style="width: 70%"></div>
          </div>
        </div>

        <!-- Skill 6: Python -->
        <div class="space-y-2">
          <div class="flex justify-between font-semibold">
            <span>Python</span>
            <span class="text-cyan-400">65%</span>
          </div>
          <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden">
            <div class="bg-cyan-500 h-full rounded-full" style="width: 65%"></div>
          </div>
        </div>

      </div>

      <!-- Other Tools / Clickable Links -->
      <div class="mt-12 pt-8 border-t border-gray-800">
        <h3 class="text-2xl font-bold text-cyan-400 mb-6 text-center">Other Tools & Technologies</h3>
        
        <div class="flex flex-wrap justify-center gap-4">
          
          <!-- GitHub Link (আপনাকে আপনার আসল GitHub প্রোফাইল লিঙ্ক বসাতে হবে) -->
          <a href="https://github.com/" 
             target="_blank" 
             class="bg-gray-800 text-gray-300 px-4 py-2 rounded-xl border border-gray-700 hover:bg-cyan-500 hover:text-black hover:border-cyan-500 transition duration-300">
            Git / GitHub
          </a>

          <!-- NetBeans Link -->
          <a href="https://netbeans.apache.org/" 
             target="_blank" 
             class="bg-gray-800 text-gray-300 px-4 py-2 rounded-xl border border-gray-700 hover:bg-cyan-500 hover:text-black hover:border-cyan-500 transition duration-300">
            NetBeans
          </a>

          <!-- Google Colab Link -->
          <a href="https://colab.research.google.com/" 
             target="_blank" 
             class="bg-gray-800 text-gray-300 px-4 py-2 rounded-xl border border-gray-700 hover:bg-cyan-500 hover:text-black hover:border-cyan-500 transition duration-300">
            Google Colab
          </a>

          <!-- MS Office Link -->
          <a href="https://www.office.com/" 
             target="_blank" 
             class="bg-gray-800 text-gray-300 px-4 py-2 rounded-xl border border-gray-700 hover:bg-cyan-500 hover:text-black hover:border-cyan-500 transition duration-300">
            MS Office
          </a>

        </div>
      </div>

    </div>

  </section>

</body>
</html>
